name: Discord Webhook Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord test
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -i -H "Content-Type: application/json" \
            -d '{"content":"✅ Fresh webhook test from GitHub Actions"}' \
            "$DISCORD_WEBHOOK"
