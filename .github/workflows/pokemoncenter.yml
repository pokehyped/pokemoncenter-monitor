name: Pokemon Center Monitor

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm webhook secret exists
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is empty or missing"
            exit 1
          else
            echo "DISCORD_WEBHOOK secret exists"
          fi

      - name: Send test message to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{"content":"✅ GitHub webhook test from pokemoncenter-monitor"}' \
            "$DISCORD_WEBHOOK")

          echo "HTTP_CODE=$HTTP_CODE"
          echo "Response body:"
          cat response.txt

          if [ "$HTTP_CODE" != "204" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "Discord webhook request failed"
            exit 1
          fi
