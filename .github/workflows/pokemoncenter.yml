name: Pokemon Center Monitor

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Pokemon Center page
        run: |
          curl -L "https://www.pokemoncenter.com/category/new-releases?category=tcg-cards&availability=true" \
            -A "Mozilla/5.0" \
            -o page.html

      - name: Detect status
        run: |
          STATUS="UNKNOWN"

          if grep -qi "virtual queue" page.html; then
            STATUS="VIRTUAL QUEUE"
          elif grep -qi "preorder" page.html; then
            STATUS="PREORDER FOUND"
          elif grep -qi "add to cart" page.html; then
            STATUS="ADD TO CART FOUND"
          elif grep -qi "sold out" page.html; then
            STATUS="SOLD OUT FOUND"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV
          echo "Detected status: $STATUS"

      - name: Send Discord message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ env.STATUS }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]
          status = os.environ.get("STATUS", "UNKNOWN")
          url = "https://www.pokemoncenter.com/category/new-releases?category=tcg-cards&availability=true"

          payload = {
              "content": f"📦 Pokemon Center monitor test\nStatus: {status}\nPage: {url}"
          }

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req) as resp:
              print("HTTP status:", resp.status)
          PY
